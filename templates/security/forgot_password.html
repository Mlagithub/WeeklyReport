{% extends 'base.html' %}
{% from 'bootstrap5/form.html' import render_form, render_field %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm form-card">
            <div class="card-body">
                <h4 class="mb-2">找回密码</h4>
                {% if forgot_password_form %}
                <p class="text-muted mb-4">输入目标用户名并设置新密码。</p>
                {{ render_form(forgot_password_form) }}
                {% else %}
                <div class="alert alert-info mt-3">
                    <i class="bi bi-info-circle-fill me-1"></i>
                    忘记密码请联系管理员重置。
                </div>
                <div class="mt-3">
                    <a href="{{ url_for('login') }}" class="btn btn-outline-primary btn-sm">返回登录</a>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

{% endblock %}
